<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ارسال لینک IndexNow (حالت سریع)</title>
  <style>
    body { font-family: Tahoma; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
    .msg { margin-top: 15px; padding: 10px; border-radius: 5px; }
    .info { background: #e0f0ff; color: #004080; }
    .warn { background: #fff3cd; color: #856404; }
    button { background: #4f6ef7; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #3b54e0; }
  </style>
</head>
<body>
  <h2>🚀 ارسال سریع به IndexNow</h2>
  <p style="color: #555;">بدون نیاز به تست فایل – فقط لینک رو بفرستید.</p>
  
  <label>آدرس صفحه:</label>
  <input type="url" id="url" placeholder="https://example.com/page" value="">
  
  <label>دامنه (اختیاری):</label>
  <input type="text" id="domain" placeholder="example.com" value="">

  <button id="sendBtn">📤 ارسال به IndexNow</button>
  <div id="result" class="msg" style="display:none;"></div>

  <p style="font-size:0.8em; margin-top:20px; color:#888;">
    ⚠️ به دلیل محدودیت مرورگر، نتیجه واقعی قابل مشاهده نیست. اگر فایل <code>key.txt</code> در دامنه شما وجود داشته باشد، لینک در Bing/Yandex ایندکس خواهد شد.
  </p>

  <script>
    function generateKey() {
      const arr = new Uint8Array(16);
      crypto.getRandomValues(arr);
      return Array.from(arr, b => b.toString(16).padStart(2, '0')).join('');
    }
    function extractHost(url) {
      try { return new URL(url).hostname; } catch { return ''; }
    }
    document.getElementById('sendBtn').addEventListener('click', async () => {
      const url = document.getElementById('url').value.trim();
      const domainInput = document.getElementById('domain').value.trim();
      if (!url || !/^https?:\/\/.+/.test(url)) {
        alert('لطفاً یک آدرس معتبر وارد کنید.');
        return;
      }
      const host = domainInput || extractHost(url);
      if (!host) {
        alert('نام دامنه قابل تشخیص نیست. لطفاً دستی وارد کنید.');
        return;
      }
      const key = generateKey();
      const body = JSON.stringify({
        host: host,
        key: key,
        keyLocation: `https://${host}/${key}.txt`,
        urlList: [url]
      });
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.className = 'msg info';
      resultDiv.textContent = '⏳ در حال ارسال...';
      try {
        await fetch('https://api.indexnow.org/indexnow', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: body,
          mode: 'no-cors'
        });
        resultDiv.className = 'msg info';
        resultDiv.innerHTML = `✅ درخواست ارسال شد.<br><small>اگر فایل <code>${key}.txt</code> در ریشه دامنه <strong>${host}</strong> وجود داشته باشد، لینک ایندکس خواهد شد.</small>`;
      } catch (e) {
        resultDiv.className = 'msg warn';
        resultDiv.textContent = '❌ خطا در ارسال. لطفاً دوباره تلاش کنید.';
      }
    });
  </script>
</body>
</html>
